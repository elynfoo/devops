trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  name: Default

variables:
  imageName: elynfoo/devops-flaskapp

stages:
  - stage: Build
    displayName: Build and Push Docker Image
    jobs:
      - job: BuildPush
        displayName: Build and Push to Docker Hub
        steps:
          - script: |
              docker logout
              echo $(DOCKER_PASSWORD)| docker login -u "$(DOCKER_USERNAME)" --password-stdin
              docker build -t $(imageName):$(Build.BuildId) -t $(imageName):latest .
              docker push $(imageName):$(Build.BuildId)
              docker push $(imageName):latest
            displayName: Build and Push to Docker Hub

  - stage: Deploy
    displayName: Deploy to Kubernetes
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: Deploy to minikube
        steps:
          - script: |
              kubectl set image deployment/flask-portfolio flask-portfolio=$(imageName):$(Build.BuildId)
              kubectl rollout status deployment/flask-portfolio
            displayName: Update Kubernetes Deployment
