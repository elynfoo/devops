trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  name: Default

variables:
  imageName: elynfoo/devops-flaskapp

stages:
  - stage: Lint
    displayName: Lint Python Code
    jobs:
      - job: Lint
        displayName: Run flake8
        steps:
          - script: |
              pip install flake8
              python -m flake8 . --exclude=venv,__pycache__ --max-line-length=120
            displayName: Run flake8 on Python files

  - stage: Build
    displayName: Build and Push Docker Image
    dependsOn: Lint
    jobs:
      - job: BuildPush
        displayName: Build and Push to Docker Hub
        steps:
          - script: |
              docker logout
              echo $(DOCKER_PASSWORD)| docker login -u "$(DOCKER_USERNAME)" --password-stdin
              docker build -t $(imageName):$(Build.BuildId) -t $(imageName):latest .
              docker push $(imageName):$(Build.BuildId)
              docker push $(imageName):latest
            displayName: Build and Push to Docker Hub

  - stage: Deploy
    displayName: Deploy to Kubernetes
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: Deploy to AKS
        steps:
          - task: KubernetesManifest@1
            displayName: Update Kubernetes Deployment
            inputs:
              action: deploy
              connectionType: azureResourceManager
              azureSubscriptionConnection: flask-portfolio-aks-connection
              azureResourceGroup: flask-portfolio-rg
              kubernetesCluster: flask-portfolio-aks
              namespace: default
              manifests: k8s/deployment.yaml
