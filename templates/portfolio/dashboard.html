<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f9f9f9;
        }
        nav {
            background-color: #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between; /* left vs right */
            align-items: center;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav ul li a:hover {
            text-decoration: underline;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            font-size: 18px;
            color: #333;
        }
        .card p {
            margin: 5px 0;
            color: #555;
        }
        .tech-stack {
            font-size: 14px;
            color: #777;
        }
        .card a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
        }
        .card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <!-- Left side links -->
        <ul>
            <li><a href="/me/python">Python</a></li>
            <li><a href="/me/linux">Linux</a></li>
            <li><a href="/me/devops">DevOps</a></li>
            <li><a href="/me/others">Others</a></li>
        </ul>
        <!-- Right side login/logout -->
        <ul>
            {% if current_user.is_authenticated %}
                <li><a href="{{ url_for('logout') }}">Log out</a></li>
            {% else %}
                <li><a href="{{ url_for('login') }}">Log in</a></li>
            {% endif %}
        </ul>
    </nav>

    <h1>Updating..dashboard</h1>
</body>
</html>
