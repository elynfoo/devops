<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f9f9f9;
        }
        nav {
            background-color: #333;
            padding: 10px;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        nav ul li a:hover {
            text-decoration: underline;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            font-size: 18px;
            color: #333;
        }
        .card p {
            margin: 5px 0;
            color: #555;
        }
        .tech-stack {
            font-size: 14px;
            color: #777;
        }
        .card a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
        }
        .card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li><a href="/me/python">Python</a></li>
            <li><a href="/me/linux">Linux</a></li>
            <li><a href="/me/devOps">DevOps</a></li>
            <li><a href="/me/others">Others</a></li>
        </ul>
    </nav>

    <h1>Welcome to My Devop Portfolio</h1>
    <p style="text-align:center;"> Showcasing projects from Week 4</p>

    <div class="dashboard">
        <div class="card">
            <h2>Updating</h2>
            <p>coming soon..</p>
            <p class="tech-stack">Tech Stack: coming soon..</p>
            <a href="/">View Project</a>
        </div>

    </div>
</body>
</html>
