<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css"
          integrity="sha512-dTfge/zgoMYpP7QbHy4gWMEGsbsdZeCXz7irItjcC3sPUFtf0kuFbDz/ixG7ArTxmDjLXDmezHubeNikyKGVyQ=="
          crossorigin="anonymous">

    <title>My scratchboard page: Register</title>
</head>

<body>
    <nav class="navbar navbar-inverse">
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed"
                        data-toggle="collapse" data-target="#navbar"
                        aria-expanded="false" aria-controls="navbar">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="#">My scratchpad: register page</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% if error %}
                <div class="alert alert-warning" role="alert">
                    {{ error }}
                </div>
            {% endif %}

            <form action="{{ url_for('register') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input class="form-control" id="username" name="username"
                           placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" class="form-control" id="password"
                           name="password" placeholder="Choose a password" required>
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>

            <p class="mt-3">
                Already have an account?
                <a href="{{ url_for('login') }}">Log in here</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap JS (optional for navbar toggle) -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"
            integrity="sha512-K1qjQ+NcF+vYx04e3vFQz+KZl5Q0n5Q+6l5Q0n5Q+6l5Q0n5Q+6l5Q0n5Q+6l5Q0n5Q+6l5Q0n5Q+6l5Q0n5Q=="
            crossorigin="anonymous"></script>
</body>
</html>
